<!doctype html><html lang="de"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sidequest</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{sidequest:{bg:'#0a0a0a',card:'#111111',border:'#1F1F1F',primary:'#7C3AED',accent:'#F59E0B',text:'#F9FAFB'}},fontFamily:{inter:['Inter','sans-serif']},borderRadius:{xl2:'16px'}}}};</script>
<style>body{background:#0a0a0a}.quest-ring{background:conic-gradient(#7C3AED,#F59E0B,#7C3AED)}.glass{background:rgba(124,58,237,.15);backdrop-filter:blur(10px);border:1px solid rgba(124,58,237,.3)}</style></head>
<body class="font-inter text-sidequest-text min-h-screen"><div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/framer-motion/dist/framer-motion.js"></script><script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useEffect,useRef,useState}=React; const {motion,AnimatePresence}=Motion;
const LEVELS=[{level:1,name:'NPC',xpRequired:0},{level:2,name:'Wanderer',xpRequired:200},{level:3,name:'Abenteurer',xpRequired:500},{level:4,name:'Erkunder',xpRequired:1000},{level:5,name:'Main Character',xpRequired:2000},{level:6,name:'Legende',xpRequired:5000}];
const quests=[{id:1,title:'Der unbekannte Ort',description:'Betritt ein Café in deiner Stadt das du noch nie betreten hast. Bestell etwas das du normalerweise nie nimmst.',icon:'🗺️',difficulty:2,xp:120,time:45,conditions:{weather:'any',time:'any'}},{id:2,title:'Die stille Stunde',description:'Geh raus, setz dich irgendwo hin und schau 20 Minuten lang nur — kein Handy, keine Musik.',icon:'🌙',difficulty:1,xp:80,time:20,conditions:{weather:'any',time:'any'}},{id:3,title:'Der fremde Weg',description:'Nimm auf deinem nächsten Weg eine Route die du noch nie gegangen bist. Egal wohin — einfach links statt rechts.',icon:'⚔️',difficulty:1,xp:60,time:30,conditions:{weather:'any',time:'any'}},{id:4,title:'Das Gespräch',description:'Ruf jetzt jemanden an den du seit mehr als einem Monat nicht gesprochen hast. Kein Text — nur Anruf.',icon:'👥',difficulty:3,xp:200,time:15,conditions:{weather:'any',time:'any'}},{id:5,title:'Das perfekte Foto',description:'Finde in deiner Umgebung etwas Schönes das du noch nie fotografiert hast. Nur natürliches Licht — kein Filter.',icon:'🎨',difficulty:2,xp:100,time:20,conditions:{weather:'sunny',time:'day'}},{id:6,title:'Der Marktbesuch',description:'Geh in einen Laden den du normalerweise nie betrittst. Kauf eine Kleinigkeit die dich interessiert.',icon:'🗺️',difficulty:2,xp:110,time:30,conditions:{weather:'any',time:'day'}},{id:7,title:'Die Blackbox',description:'Geh einfach raus. Keine weiteren Anweisungen. Schau was passiert wenn du einfach anfängst zu laufen.',icon:'⬛',difficulty:5,xp:300,time:60,conditions:{weather:'any',time:'any'}},{id:8,title:'Koch mit 3 Zutaten',description:'Öffne deinen Kühlschrank. Nimm genau 3 Zutaten die du siehst und mach daraus etwas Essbares.',icon:'🎨',difficulty:3,xp:150,time:30,conditions:{weather:'rain',time:'any'}}];
const safeGet=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}; const safeSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const getWeather=async(lat,lng)=>{const API_KEY='YOUR_API_KEY_HERE';const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lng}&appid=${API_KEY}&units=metric&lang=de`);const data=await res.json();return {temp:Math.round(data.main?.temp??18),city:data.name||'Unbekannt',condition:(data.weather?.[0]?.main||'').toLowerCase().includes('rain')?'rain':'sunny'}};
const pickLevel=xp=>LEVELS.filter(l=>xp>=l.xpRequired).slice(-1)[0];
function App(){const [screen,setScreen]=useState('home'),[weather,setWeather]=useState({city:'Standort wird geladen...',temp:'--',condition:'sunny'}),[quest,setQuest]=useState(null),[lastQuestId,setLastQuestId]=useState(null),[typed,setTyped]=useState(''),[flash,setFlash]=useState(false),[streak,setStreak]=useState(safeGet('sqStreak',{days:0,last:null})),[totalXp,setTotalXp]=useState(safeGet('sqXp',0)),[historyOpen,setHistoryOpen]=useState(false),[history,setHistory]=useState(safeGet('sqHistory',[])),[daily,setDaily]=useState(safeGet('sqDaily',{})),[bonusUsed,setBonusUsed]=useState(false),[countdown,setCountdown]=useState(''),[soundOn,setSoundOn]=useState(false),[levelUp,setLevelUp]=useState(false),[xpShown,setXpShown]=useState(0);
const canvasRef=useRef(),wrapRef=useRef(),shareRef=useRef(),audioRef=useRef(null);
const mood=(weather.condition==='rain')?'Perfektes Wetter für eine Indoor-Quest 🌧️':(new Date().getHours()>=21?'Die besten Quests passieren nachts 🌙':'Raus mit dir ☀️');
const canQuest=(()=>{const d=new Date().toDateString(); return daily.doneDate!==d || (daily.bonusDate!==d && !bonusUsed)})();
useEffect(()=>{const c=canvasRef.current,ctx=c.getContext('2d');let w,h,mx=0,my=0,hover=false;const ps=[];const mk=()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,s:.2+Math.random()*.6});const resize=()=>{w=c.width=c.offsetWidth*devicePixelRatio;h=c.height=c.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);for(let i=ps.length;i<50;i++)ps.push(mk())};resize();window.addEventListener('resize',resize);const loop=()=>{ctx.clearRect(0,0,w,h);const rain=weather.condition==='rain';ctx.fillStyle=rain?'rgba(147,197,253,.45)':'rgba(255,255,255,.3)';ps.forEach(p=>{if(hover){const dx=mx-p.x,dy=my-p.y; p.vx+=dx*0.0007; p.vy+=dy*0.0007;}p.x+=rain?0.1:p.vx; p.y+=rain?1.4:p.vy; if(p.x<0||p.x>w/devicePixelRatio)p.x=Math.random()*w/devicePixelRatio; if(p.y<0||p.y>h/devicePixelRatio)p.y=0;ctx.fillRect(p.x,p.y,rain?1:2,rain?6:2);});requestAnimationFrame(loop)};loop();const wm=wrapRef.current;const mm=e=>{const r=wm.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top};wm.addEventListener('mousemove',mm);wm.addEventListener('mouseenter',()=>hover=true);wm.addEventListener('mouseleave',()=>hover=false);return ()=>window.removeEventListener('resize',resize)},[weather.condition]);
useEffect(()=>{navigator.geolocation?.getCurrentPosition(async({coords})=>{try{setWeather(await getWeather(coords.latitude,coords.longitude));}catch{setWeather({city:'API Key fehlt',temp:'--',condition:'sunny'})}},()=>setWeather({city:'Standort blockiert',temp:'--',condition:'sunny'}));},[]);
useEffect(()=>{const t=setInterval(()=>{if(daily.doneDate===new Date().toDateString()){const n=new Date(),m=new Date();m.setHours(24,0,0,0);const s=Math.max(0,Math.floor((m-n)/1000));setCountdown(`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`)}},1000);return()=>clearInterval(t)},[daily]);
const play=(freq,dur,delay=0)=>{if(!soundOn)return; const ac=audioRef.current||(audioRef.current=new(window.AudioContext||window.webkitAudioContext)()); const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(ac.destination); const t=ac.currentTime+delay; g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.1,t+.01); g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t);o.stop(t+dur+.02)};
const startQuestFlow=async(bonus=false)=>{if(!canQuest&&!bonus)return;setScreen('loading'); play(440,.08); await new Promise(r=>setTimeout(r,2000)); setFlash(true); setTimeout(()=>setFlash(false),30); const hour=new Date().getHours(),tod=hour<12?'morning':hour<18?'day':'evening'; const elig=quests.filter(q=>(q.conditions.weather==='any'||q.conditions.weather===weather.condition)&&(q.conditions.time==='any'||q.conditions.time===tod)); const pool=elig.length>1?elig.filter(q=>q.id!==lastQuestId):elig; const q={...pool[Math.floor(Math.random()*pool.length)]||quests[0]}; if(bonus) q.xp=Math.round(q.xp*1.5); setQuest(q); setLastQuestId(q.id); setTyped(''); setBonusUsed(bonus); setScreen(q.icon==='⬛'?'blackbox':'quest'); [261.6,329.6,392,523.3].forEach((n,i)=>play(n,.08,i*.05));};
useEffect(()=>{if(screen==='quest'&&quest){let i=0;const it=setInterval(()=>{i++;setTyped(quest.title.slice(0,i));if(i>=quest.title.length)clearInterval(it);},30);return()=>clearInterval(it)}},[screen,quest]);
const complete=()=>{setScreen('complete'); if(navigator.vibrate)navigator.vibrate(50); confetti({particleCount:180,spread:100,colors:['#7C3AED','#F59E0B','#ffffff']}); const gained=quest.xp; let start=performance.now(); const tick=t=>{const p=Math.min((t-start)/1300,1); setXpShown(Math.round(gained*(1-Math.pow(2,-10*p)))); if(p<1)requestAnimationFrame(tick)}; requestAnimationFrame(tick); const today=new Date().toDateString(); const prev=streak.last===new Date(Date.now()-86400000).toDateString()?streak.days+1:1; const ns={days:streak.last===today?streak.days:prev,last:today}; setStreak(ns); safeSet('sqStreak',ns); const nx=totalXp+gained; const oldL=pickLevel(totalXp).level,newL=pickLevel(nx).level; setTotalXp(nx); safeSet('sqXp',nx); const h=[{title:quest.title,date:new Date().toLocaleDateString('de-DE'),xp:gained,city:weather.city},...history].slice(0,10); setHistory(h); safeSet('sqHistory',h); const d={doneDate:today,bonusDate:bonusUsed?today:daily.bonusDate}; setDaily(d); safeSet('sqDaily',d); if(newL>oldL){setLevelUp(true); if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]); [261.6,329.6,392,523.3].forEach(n=>play(n,.5)); setTimeout(()=>setLevelUp(false),1800)} };
return <div ref={wrapRef} className="min-h-screen bg-sidequest-bg flex justify-center p-3"><div className="relative w-full max-w-[390px] min-h-[95vh] overflow-hidden rounded-xl2 border border-sidequest-border bg-sidequest-bg">
<canvas ref={canvasRef} className="absolute inset-0 w-full h-full"/>{flash&&<div className="absolute inset-0 bg-white z-40"/>}
<div className={`absolute inset-0 ${weather.condition==='rain'?'bg-blue-900/10':'bg-orange-800/10'} pointer-events-none`}/>
<button onClick={()=>setSoundOn(!soundOn)} className="absolute top-3 left-3 z-40 text-xs">{soundOn?'🔊':'🔇'}</button><button onClick={()=>setHistoryOpen(true)} className="absolute top-3 right-3 z-40">📜</button>
{levelUp&&<div className="absolute inset-0 z-50 border-4 border-amber-400 grid place-items-center bg-black/70 text-5xl font-extrabold">LEVEL UP</div>}
<AnimatePresence mode="wait">
{screen==='home'&&<motion.div key='h' className='relative z-10 h-full min-h-[95vh] flex flex-col items-center justify-center text-center px-6' initial={{opacity:0}} animate={{opacity:1}}><p className='absolute top-3 right-12 text-amber-400 text-sm'>🔥 {streak.days} Tage</p><p className='text-xs text-gray-400 mb-2'>{pickLevel(totalXp).level} · {pickLevel(totalXp).name}</p><h1 className='text-4xl font-bold mb-8'>Sidequest</h1><motion.button whileTap={{scale:.97}} onClick={()=>startQuestFlow(false)} className='relative h-[140px] w-[140px] rounded-full grid place-items-center'><motion.div className='absolute inset-0 rounded-full quest-ring p-[3px]' animate={{rotate:360}} transition={{repeat:Infinity,duration:3,ease:'linear'}}><div className='w-full h-full rounded-full bg-transparent'/></motion.div><div className='h-[120px] w-[120px] rounded-full glass shadow-[0_0_40px_rgba(124,58,237,.6)]'/></motion.button><p className='text-gray-300 mt-7'>Drück für deine nächste Mission</p><p className='text-xs text-gray-500 mt-2'>{mood}</p><p className='absolute bottom-8 text-sm text-gray-500'>{daily.doneDate===new Date().toDateString()?`Nächste Quest in ${countdown}`:`${weather.city} · ${weather.temp}°C`}</p>{daily.doneDate===new Date().toDateString()&&<button className='text-xs text-gray-400 underline mt-2' onClick={()=>startQuestFlow(true)}>Streak brechen? Bonusquest freischalten</button>}</motion.div>}
{screen==='loading'&&<motion.div key='l' className='relative z-10 h-full min-h-[95vh] flex flex-col justify-center px-8' initial={{opacity:0}} animate={{opacity:1}}>{['📍 Standort erkannt...','🌤️ Wetter wird geprüft...','⚔️ Quest wird generiert...'].map((t,i)=><motion.p key={t} initial={{opacity:0}} animate={{opacity:[0,1,1,0]}} transition={{duration:i===2?1:0.5,delay:i===0?0:i===1?0.5:1}} className='text-lg mb-3'>{t}</motion.p>)}<div className='h-2 bg-sidequest-border rounded-full overflow-hidden mt-4'><motion.div className='h-full bg-sidequest-primary' initial={{width:'0%'}} animate={{width:'100%'}} transition={{duration:2}}/></div></motion.div>}
{screen==='blackbox'&&quest&&<motion.div key='b' className='relative z-10 min-h-[95vh] bg-black p-6 flex flex-col justify-center'><Blink/></motion.div>}
{screen==='quest'&&quest&&<motion.div key='q' drag='x' onDragEnd={(e,info)=>{if(info.offset.x>100)complete(); if(info.offset.x<-100)startQuestFlow(false)}} className='relative z-10 min-h-[95vh] bg-sidequest-card p-5 flex flex-col' initial={{scale:.8,filter:'blur(20px)',opacity:0}} animate={{scale:1,filter:'blur(0px)',opacity:1}} transition={{type:'spring'}}><div className='flex justify-between text-sm'>{'⭐'.repeat(quest.difficulty).split('').map((s,i)=><motion.span key={i} initial={{y:-40,opacity:0}} animate={{y:0,opacity:1}} transition={{delay:i*.1,type:'spring'}}>{s}</motion.span>)}<motion.span initial={{scale:.7,opacity:0}} animate={{scale:1,opacity:1}} transition={{type:'spring',stiffness:300}} className='px-3 py-1 rounded-full bg-amber-500/20 text-sidequest-accent font-semibold'>+{quest.xp} XP</motion.span></div><div className='text-6xl text-center mt-10'>{quest.icon}</div><h2 className='text-[28px] font-extrabold mt-6 min-h-[68px]'>{typed}</h2><p className='text-gray-300 mt-2'>{quest.description}</p><span className='mt-5 inline-block px-4 py-2 rounded-full bg-sidequest-primary/25 text-sidequest-primary'>{quest.time} Min</span><div className='mt-auto space-y-3'><motion.button whileTap={{scale:.97}} onClick={complete} className='w-full py-3 bg-sidequest-primary rounded-xl2'>Ich mach\'s ⚔️</motion.button><motion.button whileTap={{scale:.97}} onClick={()=>startQuestFlow(false)} className='w-full py-2 border border-sidequest-border rounded-xl2'>Andere Quest</motion.button></div></motion.div>}
{screen==='complete'&&quest&&<motion.div key='c' className='relative z-10 min-h-[95vh] p-6 flex flex-col' initial={{opacity:0}} animate={{opacity:1}}><div className='mt-8 self-center'><motion.svg width='100' height='100' viewBox='0 0 100 100'><motion.path d='M20 52 L42 72 L80 30' stroke='#7C3AED' strokeWidth='8' fill='none' strokeLinecap='round' strokeLinejoin='round' initial={{pathLength:0}} animate={{pathLength:1}} transition={{duration:.6}}/></motion.svg></div><h2 className='text-3xl font-bold text-center mt-4'>Quest abgeschlossen!</h2><p className='text-center text-sidequest-accent text-2xl font-bold mt-2'>+{xpShown} XP</p><div ref={shareRef} className='mt-8 aspect-square rounded-xl2 border-2 border-sidequest-primary bg-sidequest-bg p-5 flex flex-col justify-between'><div><p className='text-3xl'>{quest.icon}</p><p className='font-bold text-xl mt-2'>{quest.title}</p></div><p className='text-sm text-gray-400'>{weather.city} · {new Date().toLocaleString('de-DE')}</p><p className='text-sidequest-accent font-semibold'>+{quest.xp} XP</p><p className='text-right text-xs text-gray-500'>Sidequest</p></div><div className='mt-auto space-y-3'><button onClick={async()=>{const c=await html2canvas(shareRef.current,{backgroundColor:'#0a0a0a',scale:2});const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`sidequest-${quest.id}.png`;a.click();}} className='w-full py-3 rounded-xl2 bg-sidequest-accent text-black font-bold'>Teilen</button><button onClick={()=>setScreen('home')} className='w-full py-3 rounded-xl2 bg-sidequest-primary'>Neue Quest</button></div></motion.div>}
</AnimatePresence>
{historyOpen&&<div onClick={()=>setHistoryOpen(false)} className='absolute inset-0 z-50 bg-black/70 p-4 flex items-end'><motion.div initial={{y:200,opacity:0}} animate={{y:0,opacity:1}} className='w-full bg-sidequest-card border border-sidequest-border rounded-xl2 p-4 space-y-2'>{history.map((h,i)=><div key={i} className='text-sm border-b border-sidequest-border pb-2'>{h.title}<div className='text-xs text-gray-400'>{h.date} · {h.city} · +{h.xp}XP</div></div>)}</motion.div></div>}
</div></div>}
function Blink(){const [t,setT]=useState(''); useEffect(()=>{const seq=['Du weißt nicht was kommt.','Das ist der Punkt.']; let s=0,i=0;const run=()=>{const str=seq[s];const it=setInterval(()=>{i++;setT(str.slice(0,i));if(i>=str.length){clearInterval(it);setTimeout(()=>{if(s===0){s=1;i=0;setT('');run();}},1000)}},30)};run();},[]); return <div className='text-white text-xl'><span className='animate-pulse'>▌</span><p className='mt-4'>{t}</p></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
